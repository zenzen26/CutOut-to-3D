<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperCut</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <span class="brand-scissors">✂</span>
      <div>
        <div class="brand-name">PaperCut</div>
        <div class="brand-sub">draw · stamp · cut · 3D</div>
      </div>
    </div>
    <div class="header-right">
      <div class="step-pills">
        <div class="pill on" id="p1">① draw</div>
        <div class="pill"    id="p3">② 3D</div>
      </div>
    </div>
  </header>

  <!-- CARD -->
  <div class="card">

    <!-- TOOLBAR: Row A = colours/tools, Row B = sliders/actions -->
    <div class="toolbar">

      <!-- ROW A: pen colours · eraser · SVG stamp -->
      <div class="toolbar-row toolbar-row-a">
        <div class="tg">
          <img src="https://img.icons8.com/ios-filled/20/2b2318/pen.png" alt="pen" class="tlbl-icon" title="Pen">
          <div class="cdot on" style="background:#c0392b" data-c="#c0392b"></div>
          <div class="cdot"    style="background:#2c5f8a" data-c="#2c5f8a"></div>
          <div class="cdot"    style="background:#3a6b4a" data-c="#3a6b4a"></div>
          <div class="cdot"    style="background:#2b2318" data-c="#2b2318"></div>
          <div class="cdot"    style="background:#6b3a6b" data-c="#6b3a6b"></div>
          <div class="cdot"    style="background:#c17f24" data-c="#c17f24"></div>
        </div>
        <div class="tsep"></div>
        <div class="tg">
          <button class="btn btn-eraser" id="btnEraser" title="Eraser">
            <img src="https://img.icons8.com/ios-filled/16/2b2318/eraser.png" alt="eraser" class="btn-icon-img" id="eraserIconImg">
          </button>
        </div>
        <div class="tsep"></div>
        <div class="tg">
          <button class="btn btn-svg" id="btnSVG">⬆ SVG stamp</button>
          <div class="stamp-badge" id="stampBadge">
            <span id="stampName">shape.svg</span>
            <span class="stamp-badge-x" id="stampClear">✕</span>
          </div>
          <input type="file" id="svgFileIn" accept=".svg,image/svg+xml">
        </div>
      </div>

      <!-- ROW B: sliders + actions (actions hidden on mobile) -->
      <div class="toolbar-row toolbar-row-b">
        <div class="tg">
          <span class="tlbl">size</span>
          <input type="range" class="trange" id="bsz" min="1" max="50" value="4">
          <div class="szpv"><div class="szdot" id="szdot" style="width:4px;height:4px"></div></div>
        </div>
        <div class="tsep"></div>
        <div class="tg">
          <span class="tlbl">smooth</span>
          <input type="range" class="trange" id="stabSlider" min="0" max="16" value="4" step="1">
          <span class="stab-val" id="stabVal">4</span>
        </div>
        <div class="tsep"></div>
        <div class="tg">
          <span class="tlbl">eraser</span>
          <input type="range" class="trange" id="esz" min="6" max="50" value="16">
          <div class="szpv"><div class="szdot" id="ezdot" style="width:16px;height:16px;border-radius:50%;background:transparent;border:2px solid #999;box-sizing:border-box;"></div></div>
        </div>
        <!-- Visible on tablet/desktop, hidden on mobile -->
        <div class="tg tg-actions hide-mobile">
          <button class="btn btn-icon" id="btnUndo" title="Undo last stroke" disabled>↩ Undo</button>
          <button class="btn btn-icon" id="btnClearAll" title="Clear all">🗑</button>
          <button class="btn btn-ghost" id="btnEdit" style="display:none">✏ Edit</button>
          <button class="btn btn-3d"    id="btn3d"    disabled>⬡ 3D</button>
        </div>
      </div>

      <!-- ROW C: actions — mobile only -->
      <div class="toolbar-row toolbar-row-c show-mobile-only">
        <button class="btn btn-icon" id="btnUndoM" title="Undo last stroke" disabled>↩ Undo</button>
        <button class="btn btn-icon" id="btnClearAllM" title="Clear all">🗑</button>
        <button class="btn btn-ghost" id="btnEditM" style="display:none">✏ Edit</button>
        <button class="btn btn-3d"    id="btn3dM"   disabled>⬡ 3D</button>
      </div>

    </div>

    <!-- CANVAS AREA -->
    <div class="cwrap" id="cwrap">
      <canvas id="drawCanvas"></canvas>
      <canvas id="stampCursor"></canvas>

      <!-- 3D OVERLAY -->
      <div id="v3d">
        <div class="v3d-bar">
          <span class="v3d-lbl">✂ 3D Mode</span>
          <div class="v3d-right">
            <label class="v3d-depth" for="depth3d">
              <span class="v3d-depth-lbl">depth</span>
              <input type="range" id="depth3d" class="v3d-range" min="0" max="20" step="1" value="0">
              <span class="v3d-depth-val" id="depth3dVal">0</span>
            </label>
            <span class="v3d-hint">drag · scroll · right-drag pan</span>
            <button class="btn-dk accent" id="btnGLB">⬇ Export GLB</button>
          </div>
        </div>
        <div class="vstack" id="vstack">
          <canvas id="tc"></canvas>
        </div>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div class="sbar">
      <div class="sdot" id="sdot"></div>
      <div class="smsg" id="smsg">Draw a closed outline, or upload an SVG stamp — then click ⬡ 3D</div>
    </div>
  </div>

  <div class="caption" id="caption">untitled clipping</div>

</div><!-- end .page -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
<script type="module" src="app.js"></script>
<script>
  // Mirror mobile Row C buttons to the real desktop ones
  function mirrorBtn(mobileId, realId) {
    const m = document.getElementById(mobileId);
    const r = document.getElementById(realId);
    if (!m || !r) return;
    // sync disabled state
    new MutationObserver(() => { m.disabled = r.disabled; })
      .observe(r, { attributes: true, attributeFilter: ['disabled'] });
    // sync display
    new MutationObserver(() => { m.style.display = r.style.display; })
      .observe(r, { attributes: true, attributeFilter: ['style'] });
    m.disabled = r.disabled;
    m.style.display = r.style.display;
    m.addEventListener('click', () => r.click());
  }
  mirrorBtn('btnUndoM',    'btnUndo');
  mirrorBtn('btn3dM',     'btn3d');
  mirrorBtn('btnClearAllM','btnClearAll');
  mirrorBtn('btnEditM',   'btnEdit');
</script>
</body>
</html>
